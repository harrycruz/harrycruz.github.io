        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/harrycruz/
        - icon: fa fa-envelope
          url: mailto:harrycruz@gmail.com

  about:
    enable: true
    title: "About Me"
    image: "/images/me.jpg"
    content: |-
      I am an AI/ML practitioner and entrepreneur with a PhD from the Hasso Plattner Institute (University of Potsdam). I founded **Rhesis AI**, a platform for structured, scalable evaluation and testing of LLMs and Gen AI applications.

      Before founding Rhesis AI, I spent three years at **Microsoft** as a Senior Data Scientist in the Data & AI Industry Solutions team, leading GenAI, NLP, RAG, and MLOps projects for major German and international clients across manufacturing, finance, and healthcare.

      My research background is in clinical predictive modeling, explainable AI, and distributed computing. I care deeply about making AI reliable and trustworthy in production environments.
    skills:
      enable: true
      title: "Core technologies I work with:"
      items:
        - "Python"
        - "Azure / Azure ML"
        - "LLMs & RAG"
        - "MLOps"
        - "Databricks / PySpark"
        - "Docker / Kubernetes"
        - "FastAPI / Flask"
        - "Next.js"

  experience:
    enable: true
    items:
      - company: "Rhesis AI GmbH"
        companyUrl: "https://rhesis.ai"
        jobs:
          - name: "Founder & CTO"
            date: "Feb 2025 – Present"
            info:
              content: Potsdam, Germany
            content: |
              Responsible for technical leadership and product development, overseeing the architecture, scalability, and reliability of Rhesis AI's testing platform for Gen AI applications.

              - Leading the design and implementation of AI-driven testing frameworks for structured, scalable evaluation of LLMs and Gen AI models.
              - Driving consulting services by advising companies on LLM evaluation strategies, test set generation, and AI quality assurance.

      - company: "Microsoft"
        companyUrl: "https://microsoft.com"
        jobs:
          - name: "Senior Data Scientist – Data & AI, Industry Solutions"
            date: "Feb 2022 – Jan 2025"
            info:
              content: Berlin, Germany
            content: |
              Led and implemented Generative AI (GenAI), NLP, information retrieval, and RAG projects for German and international clients, spanning full project lifecycles from model fine-tuning to deployment.

              - Led ML projects for major German and international companies, particularly in manufacturing (defect detection, ML monitoring).
              - Developed ML solutions across the full spectrum: cloud infrastructure, implementation, and MLOps with Azure and Databricks/PySpark.
              - Concentration areas: MLOps, Responsible AI, and Supervised Machine Learning.

      - company: "Hasso Plattner Institute"
        companyUrl: "https://hpi.de"
        jobs:
          - name: "Research Staff – Machine Learning in Medicine & Explainable AI"
            date: "Aug 2016 – Nov 2021"
            info:
              content: Potsdam, Germany
            content: |
              Developed Python frameworks and web apps for standardization and automation of clinical predictive models in a distributed computing infrastructure (Redis, Celery).

              - Led clinical ML projects using large-scale EHR data from Icahn School of Medicine at Mount Sinai (~4M patients) with SAP HANA.
              - Responsible for technical research infrastructure and scientific liaison with German medical partners (Charité, Heidelberg University Hospital, Heart Center Berlin, AOK Nordost).

      - company: "Fraunhofer Institute for Cell Therapy and Immunology"
        companyUrl: "https://www.izi.fraunhofer.de"
        jobs:
          - name: "Software Engineer – Biomedical Data Platform"
            date: "Apr 2014 – Jul 2016"
            info:
              content: Potsdam, Germany
            content: |
              Co-developed a configurable search frontend for biobank samples (Fraunhofer Metabiobank) using Perl, XML, CSS, and jQuery.

              - Developed a preprocessing pipeline to import CDISC ODM data into the clinical trial management system ObTiMA.
              - Set up and managed biomedical solution tranSMART; performed ETL for prostate cancer datasets.

