  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Harry Cruz."
    subtitle: "I build AI systems that work in production."
    content: |
      Founder & CTO of [Rhesis AI](https://rhesis.ai), building the testing platform for Gen AI applications.
      Former Senior Data Scientist at Microsoft. PhD in Internet Technologies and Systems (magna cum laude).
      Based in Potsdam, Germany. Fluent in German, English & Portuguese.
