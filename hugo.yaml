          url: "https://hpi.de"
        date: "Oct 2016 – Apr 2021"
        GPA: "magna cum laude"
        content: |-
          PhD degree (Dr.-Ing.). Thesis: *Standardizing Clinical Predictive Modeling*.

          Concentration areas: predictive modeling, web development, distributed computing, and machine learning.

      - title: "Master in Business Administration"
        school:
          name: "University of Leipzig"
          url: "https://www.uni-leipzig.de"
        date: "Oct 2011 – Sep 2013"
        content: |-
          Minor: Information Systems in Health Care.

          Concentration areas: innovation management, internationalization of medical device companies, and architecture of information systems in health care.

      - title: "Bachelor in Computer Engineering – Software Engineering"
        school:
          name: "Federal University of Pará"
          url: "https://www.ufpa.br"
        date: "Sep 2003 – Aug 2008"
        content: |-
          Concentration areas: software engineering and information systems.

          Founded the university junior enterprise, working on web software development projects with C# and PHP.

  projects:
    enable: true
    items:
      - title: "Digital Banking Avatar"
        content: |
          Led technical design and implementation of a digital banking avatar for a large German financial institution, featuring RAG-based LLM evaluation, Promptflow integration, and banking API connections. Designed a scalable data ingestion and versioning strategy. Controlled production release, with a full launch planned for 8.3 million users.
        badges:
          - "OpenAI"
          - "RAG"
          - "Text-to-Speech"
          - "Promptflow"
          - "Azure"

      - title: "Seam Strength Prediction"
        content: |
          Led a feasibility study on seam strength prediction using sensor data for a multinational consumer goods manufacturer. Managed a team of three data scientists, developed Azure ML–Databricks integration, and designed classification pipelines. Delivered insights that shaped future AI initiatives.
        badges:
          - "Azure ML"
          - "Databricks"
          - "PySpark"

      - title: "Financial Anomaly Detection"
        content: |
          Developed financial anomaly detection for the German Finance Ministry using MLOps best practices and Isolation Forest models. Delivered reusable AI orchestration templates, improving future project scalability.
        badges:
          - "Azure"
          - "MLOps"
          - "Isolation Forest"

      - title: "Defect Detection – Healthcare Manufacturer"
        content: |
          Built defect detection pipelines for transducer manufacturing, enabling automated retraining and IoT edge deployment. Reduced production line onboarding time from weeks to hours through CI/CD automation.
        badges:
          - "IoT Edge"
          - "MLOps"
          - "Databricks"
          - "CI/CD"

      - title: "Enterprise AI/ML Modernization"
        content: |
          Developed data drift monitoring, alerting, and AI/ML dashboards for a leading optics company. Deployed secure Azure ML workspaces with Terraform, delivering a scalable AI/ML blueprint across business units.
        badges:
          - "MLOps"
          - "Terraform"
          - "Data Mesh"
          - "Azure"

